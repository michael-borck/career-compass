name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Don't cancel sibling platform builds if one fails — debugging is
      # easier when all platforms report their result.
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run electron:build -- --win --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run electron:build -- --mac --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          # Renamed from APPLE_* so electron-builder's auto-detection doesn't
          # trigger its own (buggy) notarize wrapper alongside our afterSign
          # hook in scripts/notarize.js.
          NOTARIZE_APPLE_ID: ${{ secrets.APPLE_ID }}
          # App-specific password (appleid.apple.com), NOT the account password.
          # The older APPLE_ID_PASSWORD secret (set in the Next.js era) returns
          # HTTP 401 from notarytool; APPLE_APP_SPECIFIC_PASSWORD is the valid one.
          NOTARIZE_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARIZE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run electron:build -- --linux --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-distributables
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.yml
            release/*.yaml

  publish:
    # Promote the draft release that electron-builder's --publish=always
    # creates into a published "Latest" release — but only after every
    # matrix build has succeeded, so we never publish a partial release
    # missing one or more platforms.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published and Latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Publishing release $TAG"
          gh release edit "$TAG" \
            --draft=false \
            --latest \
            --repo "${{ github.repository }}"
